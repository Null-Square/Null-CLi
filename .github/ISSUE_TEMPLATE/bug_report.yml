name: Bug report
description: Report a problem with Null AI CLI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Null AI CLI. Please do **not** include real target
        hostnames, credentials, API keys, or customer data in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `null-ai agent run ...`, I expected X but got Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) and (redacted) output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `null-ai version`.
      placeholder: Null AI CLI by NullSquare v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v20.x
    validations:
      required: true
