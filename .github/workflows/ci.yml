name: CI

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build (all packages)
        run: pnpm -r build

      - name: Run important unit tests (core)
        run: pnpm --filter @null/null-core --if-present test:ci

      - name: Run important unit tests (cli)
        run: pnpm --filter @null/null-cli --if-present test:ci
