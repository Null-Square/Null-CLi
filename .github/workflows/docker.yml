name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - sandbox/**
      - src/**
      - package*.json
      - tsconfig.json
      - .github/workflows/docker.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - sandbox/**
      - src/**
      - package*.json
      - tsconfig.json
      - .github/workflows/docker.yml

jobs:
  cli-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI image
        run: docker build -t null-ai-cli:ci .

      - name: Check CLI image
        run: docker run --rm null-ai-cli:ci --help

  sandbox-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sandbox image
        run: docker build -f sandbox/Dockerfile -t null-ai-cli-sandbox:ci .

      - name: Smoke sandbox image
        run: |
          docker run --rm \
            -v "$PWD/sandbox:/opt/null-cli/sandbox:ro" \
            null-ai-cli-sandbox:ci \
            sh /opt/null-cli/sandbox/smoke.sh /opt/null-cli/sandbox/tools-manifest.json
