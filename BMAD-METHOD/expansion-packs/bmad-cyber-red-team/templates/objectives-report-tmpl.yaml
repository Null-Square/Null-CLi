# <!-- Powered by BMAD(R) Core -->
---
template:
  id: impact-report
  name: Impact Demonstration & Evidence Report
  version: 1.2
  description: Live proof-of-concept execution, evidence, and business impact validation from authorized red team operations
  output:
    format: markdown
    filename: "docs/red-team/impact-report.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "Impact Validation Actions"
    options:
      - "Verify evidence artefacts (logs, screenshots, hashes)"
      - "Confirm cleanup of all dummy files and artefacts"
      - "Assess business impact severity per objective"
      - "Review detection telemetry alignment"
      - "Validate ATT&CK technique execution"
      - "Document lessons learned from execution"
      - "Prepare evidence bundle for final report"
      - "Coordinate blue-team debrief timing"
      - "Proceed to final report synthesis"

validation:
  required_sections:
    - objectives
    - outcomes
    - defensive_recs
    - closeout

sections:
  - id: objectives
    title: Executed Objectives & Success Criteria
    instruction: Factual summary of authorized PoC actions and business impact goals.
    template: |
      - **Objective:** {{objective}}
        - **ATT&CK Techniques:** {{techniques}}
        - **Success Criteria Met:** {{success_criteria_met}} ✅ Yes / ❌ No
        - **Execution Timestamp:** {{execution_timestamp}} UTC
        - **ROE Compliance:** {{roe_compliance_status}}
    elicit: true

  - id: plan
    title: Executed Actions
    instruction: Real commands and tools used during impact demonstration.
    template: |
      - **Action:** {{action}}
        - **Tooling:** {{tooling}}
        - **Command Executed:** `{{command_executed}}`
        - **Target System:** {{target_system}}
        - **Observables Generated:** {{observables}}
        - **Evidence Captured:** 
          - Log: `{{log_path}}`
          - Screenshot: `{{screenshot_path}}`
          - Hash: `{{file_hash}}`

  - id: outcomes
    title: Verified Outcomes & Evidence
    instruction: Document real results, artefacts, and business impact.
    template: |
      - **Result:** {{result}}
        - **Business Impact Demonstrated:** {{business_impact}}
          > "We accessed dummy payroll data → could have stolen 10k real records."
        - **Evidence Artefacts:** 
          {{#each evidence_artefacts}}
          - {{this.type}}: `{{this.path}}` (Hash: `{{this.hash}}`)
          {{/each}}
        - **Detection Response Observed:** {{detection_response}}
        - **Lessons Learned:** {{lessons}}

  - id: defensive_recs
    title: Defensive Recommendations
    instruction: Actionable hardening and detection improvements based on real execution.
    template: |
      - **Gap Observed:** {{gap}}
        - **Recommendation:** {{recommendation}}
        - **Detection Rule (Sigma/Query):** `{{detection_rule}}`
        - **Owner:** {{owner}}
        - **Priority:** {{priority}} (Critical / High / Medium)

  - id: closeout
    title: Engagement Closeout & Cleanup
    instruction: Confirm safe termination and readiness for final reporting.
    template: |
      - **Summary:** {{summary}}
      - **Cleanup Verified:** {{cleanup_verified}} ✅ Yes / ⚠️ Partial
      - **Cleanup Evidence:** `{{cleanup_log_path}}`
      - **Stakeholder Briefing Ready:** {{briefing_ready}}
      - **Next Steps:** 
        - Final Report Synthesis
        - Blue Team Debrief
        - Remediation Tracking