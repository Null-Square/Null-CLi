# <!-- Powered by BMAD(R) Core -->
---
template:
  id: payload-report
  name: Payload & Lure Execution Report
  version: 1.2
  description: Live payload and lure artefacts, hashes, and telemetry for authorized red team operations
  output:
    format: markdown
    filename: "docs/red-team/payload-report.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "Weaponization Validation Actions"
    options:
      - "Verify payload hash and file integrity"
      - "Confirm lure content and macro functionality"
      - "Review detection test results (AV/EDR)"
      - "Validate C2 profile compatibility"
      - "Check kill-switch effectiveness"
      - "Assess staging requirements"
      - "Align artefacts with delivery channels"
      - "Document open risks or build failures"
      - "Proceed to next phase"

validation:
  required_sections:
    - summary
    - payloads
    - detections
    - handoff

sections:
  - id: summary
    title: Execution Summary
    instruction: Factual overview of built payloads and lures.
    template: |
      - **Objective:** {{objective}}
      - **Mission Drivers:** {{mission_drivers}}
      - **Execution Timestamp:** {{execution_timestamp}} UTC
      - **ROE Compliance:** {{roe_compliance_status}}
      - **Lab-Safe Defaults Used:** {{lab_safe_defaults_used}}

  - id: inputs
    title: Recon Inputs
    instruction: Key recon findings that drove payload selection.
    template: |
      - **Finding:** {{finding}}
        - **Relevance:** {{relevance}}
        - **Source:** {{source}}
        - **Recon Report Link:** `{{recon_report_path}}`

  - id: payloads
    title: Built Payloads
    instruction: Report actual generated payload binaries and configurations.
    template: |
      - **Payload Name:** {{payload_name}}
        - **ATT&CK Technique:** {{technique}}
        - **Build Command:** `{{build_command}}`
        - **Artefact Path:** `{{artefact_path}}`
        - **SHA256 Hash:** `{{sha256_hash}}`
        - **File Size:** {{file_size}} bytes
        - **C2 Profile:** `{{c2_profile_path}}`
        - **Test Result:** {{test_result}} (e.g., "Evades Defender ATP in lab")
        - **Observables:** {{observables}}
        - **Kill-Switch:** `{{kill_command}}`
        - **Build Log:** `{{build_log_path}}`
    elicit: true

  - id: lures
    title: Generated Lures
    instruction: Document actual lure files and content.
    template: |
      - **Channel:** {{channel}}
        - **Narrative:** {{narrative}}
        - **Lure File:** `{{lure_file_path}}`
        - **SHA256 Hash:** `{{lure_hash}}`
        - **Embedded Payload:** `{{embedded_payload_path}}`
        - **Success Indicators:** {{success_indicators}}
        - **Macro/VBA Status:** {{macro_status}} (Enabled / Disabled / Tested)
        - **Lure Log:** `{{lure_log_path}}`

  - id: detections
    title: Observed & Expected Telemetry
    instruction: Link payloads to real or expected defender alerts.
    template: |
      - **Detection Source:** {{detection_source}} (e.g., EDR, Mail Gateway, SIEM)
        - **Observable:** {{observable}}
        - **Detection Status:** {{detection_status}} (Observed in lab / Expected in prod)
        - **Test Evidence:** 
          ```log
          {{test_evidence}}
          ```
        - **Mitigation Guidance:** {{mitigation}}

  - id: mitre_mapping
    title: MITRE ATT&CK Execution Mapping
    instruction: Map each payload to real technique usage.
    template: |
      - **Technique:** {{technique_id}} – {{technique_name}}
        - **Payload Evidence:** {{payload_evidence_path}}
        - **Evasion Used:** {{evasion_technique}}
        - **Detection Gap:** {{detection_gap}}

  - id: handoff
    title: Handoff to Delivery
    instruction: Provide confirmed artefacts and staging requirements.
    template: |
      - **Ready Payloads:** 
        {{#each ready_payloads}}
        - {{this.name}}: `{{this.path}}` (Hash: `{{this.hash}}`)
        {{/each}}
      - **Ready Lures:** 
        {{#each ready_lures}}
        - {{this.channel}}: `{{this.path}}`
        {{/each}}
      - **Staging Requirements:** {{staging_requirements}}
      - **C2 Infrastructure Needed:** {{c2_requirements}}
      - **Monitoring Hooks:** {{monitoring_hooks}}
      - **Outstanding Questions:** {{questions}}