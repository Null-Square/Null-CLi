# <!-- Powered by BMAD(R) Core -->
---
template:
  id: recon-report
  name: Reconnaissance Report
  version: 1.1
  description: Structured recon report (simulation-first)
  output:
    format: markdown
    filename: "docs/red-team/recon-report.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "Recon Elicitation Actions"
    options:
      - "Clarify scope boundaries or prohibited actions"
      - "Identify additional data sources for passive recon"
      - "Explore blue-team telemetry to validate findings"
      - "Assess risk/impact of exposed assets"
      - "Brainstorm stealthier enumeration approaches"
      - "Stress-test assumptions about asset ownership"
      - "Map findings to compliance requirements"
      - "Plan follow-up questions for stakeholders"
      - "Proceed to next section"
  allow_skip: false

validation:
  required_sections:
    - scope
    - findings
    - mitre_mapping
    - next

sections:
  - id: scope
    title: Scope & ROE
    instruction: |
      Document allowed targets, prohibited actions, timebox, and data policy.
    template: |
      - **Allowed Targets:** {{allowed_targets}}
      - **Prohibited Actions:** {{prohibited_actions}}
      - **Timebox:** {{timebox}}
      - **Data Handling Rules:** {{data_policy}}
    elicit: true
  - id: objectives
    title: Recon Objectives
    instruction: List concrete questions the recon must answer.
    template: |
      - {{objective}}
  - id: methodology
    title: Methodology (Simulated)
    instruction: |
      List tools/commands for OSINT and surface mapping (documentation only).
      Include assumptions, parameters, timestamps, and artefact locations.
    template: |
      - **Tool:** {{tool_name}}
        - **Command:** `{{command}}`
        - **Purpose:** {{purpose}}
        - **Artefacts:** {{artefacts}}
        - **Assumptions:** {{assumptions}}
  - id: findings
    title: Findings
    instruction: Summarize domains, subdomains, hosts, tech stacks, exposures.
    template: |
      - **Category:** {{category}}
        - **Detail:** {{detail}}
        - **Evidence:** {{evidence}}
        - **Detection Notes:** {{detection_notes}}
    elicit: true
  - id: attack_surface
    title: Attack Surface Summary
    instruction: Highlight high-value assets and potential entry points.
    template: |
      - **Asset:** {{asset}}
        - **Exposure:** {{exposure}}
        - **Priority:** {{priority}}
        - **Recommended Next Step:** {{next_step}}
  - id: mitre_mapping
    title: MITRE ATT&CK Mapping
    instruction: Map relevant techniques with notes and references.
    template: |
      - **Technique:** {{technique_id}} {{technique_name}}
        - **Related Finding:** {{related_finding}}
        - **Reference:** {{reference}}
        - **Defensive Note:** {{defensive_note}}
  - id: next
    title: Handoff to Weaponization
    instruction: Key insights to inform payload/lure planning.
    template: |
      - **Insight:** {{insight}}
      - **Implication for Payloads:** {{payload_implication}}
      - **Telemetry to Preserve:** {{telemetry}}
      - **Open Questions:** {{open_questions}}
