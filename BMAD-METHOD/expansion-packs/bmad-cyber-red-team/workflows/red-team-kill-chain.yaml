# <!-- Powered by BMAD(R) Core -->
workflow:
  id: red-team-kill-chain
  name: Red Team Kill Chain Workflow (Simulation)
  description: >-
    Linear red-team simulation aligned to the Lockheed Martin Kill Chain with MITRE ATT&CK
    context. Each hand-off is documentation-only and reinforces defender awareness.
  type: simulation
  project_types:
    - red-team-simulation
    - kill-chain-training
    - tabletop-exercise
  triggers:
    - command: /red-team
    - intent: run red team
  inputs:
    - target_summary
    - scope_and_roe
    - constraints
    - intelligence_feeds (optional)

  sequence:
    - step: recon
      title: Reconnaissance
      agent: recon
      uses:
        task: recon-phase
        template: recon-report
      outputs:
        - docs/red-team/recon-report.md
      notes: |
        Confirm scope and ROE before simulating reconnaissance. Produce recon-report.md and
        surface key risks for downstream phases.

    - step: weaponization
      title: Weaponization
      agent: weaponization
      requires:
        - docs/red-team/recon-report.md
      uses:
        task: weaponization-phase
        template: payload-report
      outputs:
        - docs/red-team/payload-report.md
      notes: |
        Translate recon insights into payload and lure concepts with defensive countermeasures.
        Maintain simulation-only payload descriptions.

    - step: delivery
      title: Delivery
      agent: delivery
      requires:
        - docs/red-team/payload-report.md
      uses:
        task: delivery-phase
        template: delivery-plan
      outputs:
        - docs/red-team/delivery-plan.md
      notes: |
        Design simulated delivery logistics, risk scoring, and detection considerations for
        each proposed channel.

    - step: exploitation
      title: Exploitation
      agent: exploitation
      requires:
        - docs/red-team/recon-report.md
        - docs/red-team/delivery-plan.md
      uses:
        task: exploitation-phase
        template: exploit-report
      outputs:
        - docs/red-team/exploit-report.md
      notes: |
        Model exploit chains, prerequisites, mitigations, and kill-switch guidance. No
        weaponized code or actionable payloads.

    - step: installation
      title: Installation (Persistence)
      agent: installation
      requires:
        - docs/red-team/exploit-report.md
      uses:
        task: installation-phase
        template: persistence-plan
      outputs:
        - docs/red-team/persistence-plan.md
      notes: |
        Capture persistence concepts, rollback plans, and defender visibility expectations.

    - step: c2
      title: Command and Control
      agent: c2
      requires:
        - docs/red-team/persistence-plan.md
      uses:
        task: c2-phase
        template: c2-plan
      outputs:
        - docs/red-team/c2-plan.md
      notes: |
        Provide simulated C2 profiles, traffic shaping, and blue-team detection strategies.

    - step: objectives
      title: Actions on Objectives
      agent: actions-on-objectives
      requires:
        - docs/red-team/c2-plan.md
      uses:
        task: objectives-phase
        template: objectives-report
      outputs:
        - docs/red-team/objectives-report.md
      notes: |
        Document simulated impacts, evidence, defensive recommendations, and engagement
        close-out guidance.

  outputs:
    - docs/red-team/recon-report.md
    - docs/red-team/payload-report.md
    - docs/red-team/delivery-plan.md
    - docs/red-team/exploit-report.md
    - docs/red-team/persistence-plan.md
    - docs/red-team/c2-plan.md
    - docs/red-team/objectives-report.md

  handoff_prompts:
    recon_to_weaponization: |
      Recon complete. Key exposures, asset map, and ATT&CK leads are available in
      docs/red-team/recon-report.md. Confirm ROE alignment before drafting payload concepts.
    weaponization_to_delivery: |
      Payload and lure concepts documented in docs/red-team/payload-report.md. Design delivery
      playbooks that respect constraints and contain detection plans.
    delivery_to_exploitation: |
      Delivery logistics finalized in docs-red-team/delivery-plan.md. Model exploit sequences
      with clear prerequisites and blue-team detection notes.
    exploitation_to_installation: |
      Exploit design captured in docs/red-team/exploit-report.md. Outline persistence options
      with rollback guidance and risk tiers.
    installation_to_c2: |
      Persistence approach defined in docs/red-team/persistence-plan.md. Draft C2 profiles with
      traffic shaping and alert expectations.
    c2_to_objectives: |
      C2 plan completed in docs/red-team/c2-plan.md. Summarize mission objectives, simulated
      outcomes, and defensive uplift recommendations.
