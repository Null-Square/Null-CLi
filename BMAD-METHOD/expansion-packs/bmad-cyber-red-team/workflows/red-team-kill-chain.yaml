# <!-- Powered by BMAD(R) Core -->
workflow:
  id: red-team-kill-chain
  name: Red Team Kill Chain Workflow (Execution)
  description: >-
    Authorized red team engagement aligned to the Lockheed Martin Kill Chain with MITRE ATT&CK
    context. Each phase executes real actions within documented ROE, producing live artefacts
    and defender-aware telemetry. All operations require explicit confirmation and maintain full auditability.
  type: execution
  project_types:
    - red-team-engagement
    - authorized-penetration-test
    - offensive-security-assessment
  triggers:
    - command: /red-team
    - intent: run red team
  inputs:
    - target_summary
    - scope_and_roe
    - constraints
    - intelligence_feeds (optional)
    - execution_approval: true  # Explicit confirmation required for live actions

  sequence:
    - step: recon
      title: Reconnaissance
      agent: recon
      uses:
        task: recon-phase
        template: recon-report
      outputs:
        - docs/red-team/recon-report.md
        - reports/amass/
        - reports/nmap/
        - reports/httpx/
      notes: |
        Perform passive and (if authorized) active reconnaissance. Generate real artefacts in reports/
        with timestamps, hashes, and ATT&CK mappings. Confirm scope before execution.

    - step: weaponization
      title: Weaponization
      agent: weaponization
      requires:
        - docs/red-team/recon-report.md
      uses:
        task: weaponization-phase
        template: payload-report
      outputs:
        - docs/red-team/payload-report.md
        - build/payloads/
        - build/lures/
        - build/profiles/
        - reports/weaponization/
      notes: |
        Build and test real payloads and lures based on recon findings. Store artefacts in build/
        with SHA256 hashes, logs, and kill-switch instructions. All generation requires user confirmation.

    - step: delivery
      title: Delivery
      agent: delivery
      requires:
        - docs/red-team/payload-report.md
      uses:
        task: delivery-phase
        template: delivery-plan
      outputs:
        - docs/red-team/delivery-plan.md
        - build/infrastructure/
        - reports/delivery/
      notes: |
        Deploy live delivery infrastructure (email, web, SMB) within authorized scope.
        Verify service availability, log startup output, and provide monitoring hooks for exploitation.

    - step: exploitation
      title: Exploitation
      agent: exploitation
      requires:
        - docs/red-team/recon-report.md
        - docs/red-team/delivery-plan.md
      uses:
        task: exploitation-phase
        template: exploit-report
      outputs:
        - docs/red-team/exploit-report.md
        - reports/exploitation/
      notes: |
        Execute approved exploit chains against delivered payloads. Capture proof of execution,
        system context, and defensive telemetry. Maintain full rollback and cleanup procedures.

    - step: installation
      title: Installation (Persistence)
      agent: installation
      requires:
        - docs/red-team/exploit-report.md
      uses:
        task: installation-phase
        template: persistence-plan
      outputs:
        - docs/red-team/persistence-plan.md
        - reports/installation/
      notes: |
        Establish authorized persistence mechanisms. Log artefacts, registry keys, or cron jobs.
        Include defender visibility notes and immediate removal steps.

    - step: c2
      title: Command and Control
      agent: c2
      requires:
        - docs/red-team/persistence-plan.md
      uses:
        task: c2-phase
        template: c2-plan
      outputs:
        - docs/red-team/c2-plan.md
        - build/c2/
        - reports/c2/
      notes: |
        Operate live C2 channels with traffic shaping and evasion. Log beaconing patterns,
        encryption metadata, and detection opportunities for blue team correlation.

    - step: objectives
      title: Actions on Objectives
      agent: actions-on-objectives
      requires:
        - docs/red-team/c2-plan.md
      uses:
        task: objectives-phase
        template: objectives-report
      outputs:
        - docs/red-team/objectives-report.md
        - reports/objectives/
      notes: |
        Perform authorized actions on objectives (data staging, lateral movement, impact simulation).
        Document outcomes, evidence paths, and defensive recommendations with full audit trail.

  outputs:
    - docs/red-team/recon-report.md
    - docs/red-team/payload-report.md
    - docs/red-team/delivery-plan.md
    - docs/red-team/exploit-report.md
    - docs/red-team/persistence-plan.md
    - docs/red-team/c2-plan.md
    - docs/red-team/objectives-report.md
    - reports/          # All raw logs and artefacts
    - build/            # All generated payloads, lures, configs

  handoff_prompts:
    recon_to_weaponization: |
      Recon complete. Key exposures, asset map, and ATT&CK leads are available in
      docs/red-team/recon-report.md. Confirm ROE alignment before building payloads.
    weaponization_to_delivery: |
      Payload and lure artefacts generated in build/payloads/ and build/lures/.
      Delivery infrastructure can now be deployed using docs/red-team/delivery-plan.md.
    delivery_to_exploitation: |
      Delivery infrastructure is live: {{active_channels}}.
      Payloads available at {{payload_paths}}. Begin exploitation with monitoring enabled.
    exploitation_to_installation: |
      Initial access confirmed in docs/red-team/exploit-report.md.
      Proceed with authorized persistence mechanisms and log all artefacts.
    installation_to_c2: |
      Persistence established. C2 channels can now be activated with profiles in build/c2/.
    c2_to_objectives: |
      Stable C2 confirmed. Execute authorized actions on objectives with full evidence capture.