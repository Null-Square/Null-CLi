# <!-- Powered by BMAD(R) Core -->
---
template:
  id: c2-plan
  name: Command & Control Plan
  version: 1.1
  description: Simulated C2 communications and profiles
  output:
    format: markdown
    filename: "docs/red-team/c2-plan.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "C2 Elicitation Actions"
    options:
      - "Compare C2 profiles on stealth vs. resilience"
      - "Define kill-switch triggers for a profile"
      - "Map beacon artefacts to defender analytics"
      - "Plan certificate and infrastructure lifecycle"
      - "Assess legal/policy implications of hosting choices"
      - "Develop fallback channels and activation criteria"
      - "Identify monitoring gaps and instrumentation needs"
      - "Coordinate teardown/cleanup sequencing"
      - "Proceed to next section"

validation:
  required_sections:
    - channels
    - detections
    - handoff

sections:
  - id: overview
    title: Overview
    instruction: Summarize C2 objectives, constraints, and priorities.
    template: |
      - **Objective:** {{objective}}
      - **Primary Protocols:** {{protocols}}
      - **Constraints:** {{constraints}}
      - **ROE Notes:** {{roe_notes}}
  - id: channels
    title: Channels & Profiles (Simulated)
    instruction: HTTP(S), DNS, SSH, or others; headers, jitter, intervals.
    template: |
      - **Profile Name:** {{profile_name}}
        - **Tooling:** {{tooling}}
        - **Listener Settings:** {{settings}}
        - **Beacon Cadence:** {{cadence}}
        - **Headers/Metadata:** {{headers}}
        - **Kill-Switch:** {{kill_switch}}
        - **Failover Channel:** {{failover}}
    elicit: true
  - id: opsec
    title: OPSEC Considerations
    instruction: Noise, blending, infrastructure hygiene (documentation-only).
    template: |
      - **Risk:** {{risk}}
        - **Mitigation:** {{mitigation}}
        - **Monitoring:** {{monitoring}}
        - **Notes:** {{notes}}
  - id: detections
    title: Detections & Blue-Team Visibility
    instruction: Network/endpoint observables and alerts.
    template: |
      - **Telemetry Source:** {{source}}
        - **Observable:** {{observable}}
        - **Detection Query:** {{query}}
        - **Validation:** {{validation}}
  - id: resiliency
    title: Resiliency & Contingency
    instruction: Define failover paths, activation triggers, and recovery steps.
    template: |
      - **Scenario:** {{scenario}}
        - **Fallback Channel:** {{fallback}}
        - **Activation Criteria:** {{criteria}}
        - **Teardown Instructions:** {{teardown}}
  - id: handoff
    title: Handoff to Actions on Objectives
    instruction: Requirements to execute objectives.
    template: |
      - **Active Profiles:** {{active_profiles}}
      - **Authentication Requirements:** {{auth_requirements}}
      - **Communication Cadence:** {{communication_cadence}}
      - **Monitoring Expectations:** {{monitoring_expectations}}
      - **Cleanup Plan:** {{cleanup_plan}}
