# <!-- Powered by BMAD(R) Core -->
---
template:
  id: delivery-plan
  name: Delivery Plan
  version: 1.1
  description: Simulated delivery logistics and detection planning
  output:
    format: markdown
    filename: "docs/red-team/delivery-plan.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "Delivery Elicitation Actions"
    options:
      - "Compare delivery channels on risk vs. impact"
      - "Identify required staging infrastructure steps"
      - "Plan detection validation for a channel"
      - "Consider legal/compliance implications"
      - "Brainstorm rollback/abort procedures"
      - "Map telemetry sources for operations"
      - "Assess resource requirements (time, staff, tooling)"
      - "Define contingency plan triggers"
      - "Proceed to next section"

validation:
  required_sections:
    - summary
    - channel_matrix
    - detections
    - handoff

sections:
  - id: summary
    title: Summary
    instruction: High-level overview of delivery strategy and constraints.
    template: |
      - **Mission Goal:** {{mission_goal}}
      - **Primary Channels:** {{primary_channels}}
      - **Constraints:** {{constraints}}
      - **ROE Notes:** {{roe_notes}}
  - id: inputs
    title: Inputs from Payload Report
    instruction: Capture payload insights that shape delivery.
    template: |
      - **Payload:** {{payload_name}}
        - **Key Requirements:** {{requirements}}
        - **Observables to Manage:** {{observables}}
  - id: channel_matrix
    title: Channel Matrix
    instruction: Compare delivery channels, risks, and detections.
    template: |
      - **Channel:** {{channel}}
        - **Tooling:** {{tooling}}
        - **Operational Steps:** {{steps}}
        - **Risk Score:** {{risk_score}}
        - **Detection Plan:** {{detection_plan}}
        - **Contingency:** {{contingency}}
    elicit: true
  - id: staging
    title: Staging & Infrastructure Checklist
    instruction: Outline infrastructure preparation, validation, and teardown.
    template: |
      - **Task:** {{task}}
        - **Command/Procedure:** `{{command}}`
        - **Owner:** {{owner}}
        - **Verification:** {{verification}}
  - id: detections
    title: Detections & Monitoring
    instruction: Define expected alerts, log sources, and validation steps.
    template: |
      - **Telemetry Source:** {{source}}
        - **Observable:** {{observable}}
        - **Detection Rule:** {{rule}}
        - **Validation Step:** {{validation}}
  - id: mitigations
    title: Mitigations & Rollback
    instruction: Document rollback instructions and recovery steps.
    template: |
      - **Scenario:** {{scenario}}
        - **Abort Procedure:** {{abort_procedure}}
        - **Cleanup Command:** `{{cleanup_command}}`
        - **Responsible Team:** {{team}}
  - id: handoff
    title: Handoff to Exploitation
    instruction: Provide prerequisites and monitoring expectations for exploitation.
    template: |
      - **Ready Channels:** {{ready_channels}}
      - **Access Requirements:** {{access_requirements}}
      - **Monitoring Hooks:** {{monitoring_hooks}}
      - **Risks to Track:** {{risks}}
      - **Open Issues:** {{open_issues}}
