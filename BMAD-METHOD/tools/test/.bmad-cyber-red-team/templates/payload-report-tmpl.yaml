# <!-- Powered by BMAD(R) Core -->
---
template:
  id: payload-report
  name: Payload & Lure Plan
  version: 1.1
  description: Simulated payload and lure blueprint
  output:
    format: markdown
    filename: "docs/red-team/payload-report.md"

workflow:
  mode: interactive
  elicitation: advanced-elicitation
  custom_elicitation:
    title: "Weaponization Elicitation Actions"
    options:
      - "Validate alignment between payload concept and recon exposure"
      - "Assess detection surface for a payload option"
      - "Brainstorm alternate lure narratives"
      - "Map payload observables to defender telemetry"
      - "Evaluate ROE compliance and ethical considerations"
      - "Define kill-switch or rollback strategy"
      - "Estimate required infrastructure/staging tasks"
      - "Compare payload risk vs. mission value"
      - "Proceed to next section"

validation:
  required_sections:
    - summary
    - payloads
    - detections
    - handoff

sections:
  - id: summary
    title: Summary
    instruction: High-level goal and constraints.
    template: |
      - **Objective:** {{objective}}
      - **Mission Drivers:** {{mission_drivers}}
      - **Constraints:** {{constraints}}
      - **ROE Notes:** {{roe_notes}}
  - id: inputs
    title: Inputs from Recon
    instruction: Key recon findings that drive this plan.
    template: |
      - **Finding:** {{finding}}
        - **Relevance:** {{relevance}}
        - **Source:** {{source}}
  - id: payloads
    title: Payload Concepts (Simulated)
    instruction: |
      Describe proposed payloads at a high level. No functional code.
      Note dependencies, observables, kill-switches, and detection considerations.
    template: |
      - **Payload Name:** {{payload_name}}
        - **Technique:** {{technique}}
        - **Command/Build Reference:** `{{command}}`
        - **Dependencies:** {{dependencies}}
        - **Observables:** {{observables}}
        - **Kill-Switch:** {{kill_switch}}
        - **Assumptions:** {{assumptions}}
    elicit: true
  - id: lures
    title: Lure Design (Simulated)
    instruction: Document messaging, pretext, and materials.
    template: |
      - **Channel:** {{channel}}
        - **Narrative:** {{narrative}}
        - **Artefacts:** {{artefacts}}
        - **Success Indicators:** {{success_indicators}}
        - **Failure Signals:** {{failure_signals}}
  - id: detections
    title: Detections & Mitigations
    instruction: Blue-team detections and mitigations to expect.
    template: |
      - **Detection Source:** {{detection_source}}
        - **Observable:** {{observable}}
        - **Rule/Query:** {{rule}}
        - **Mitigation:** {{mitigation}}
  - id: mitre_mapping
    title: MITRE ATT&CK Mapping
    instruction: Relevant techniques and sub-techniques.
    template: |
      - **Technique:** {{technique_id}} {{technique_name}}
        - **Payload/Lure Link:** {{link}}
        - **Notes:** {{notes}}
  - id: handoff
    title: Handoff to Delivery
    instruction: What delivery needs to know.
    template: |
      - **Required Infrastructure:** {{infrastructure}}
      - **Critical Timing:** {{timing}}
      - **Monitoring Hooks:** {{monitoring}}
      - **Outstanding Questions:** {{questions}}
