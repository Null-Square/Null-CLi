version: "3.8"

services:
  deepseek:
    image: vllm/vllm-openai:latest
    container_name: deepseek-vllm
    ports:
      - "8000:8000"
    environment:
      # Optional: set this if the HF repo is gated
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      # Persist/download models/cache between runs
      - hf-cache:/root/.cache/huggingface
      # Uncomment to serve from a local directory you pre-downloaded
      # - ./models:/models
    command: >-
      --model huihui-ai/DeepSeek-R1-0528-Qwen3-8B-abliterated
      --served-model-name deepseek-r1
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  null:
    build:
      context: .
    image: null-cli:local
    container_name: null-cli
    depends_on:
      - deepseek
    environment:
      - NULL_EXPERIMENTAL_LOCAL=1
      - OPENAI_BASE_URL=http://deepseek:8000/v1
      - OPENAI_MODEL=deepseek-r1
    working_dir: /workspace
    volumes:
      - ./:/workspace
    tty: true
    stdin_open: true
    command: ["null"]

volumes:
  hf-cache:
    driver: local

